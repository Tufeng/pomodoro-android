name: Android CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: 单元测试
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 赋予 gradlew 执行权限
        run: chmod +x gradlew

      - name: 运行单元测试
        run: |
          ./gradlew :app:testDebugUnitTest \
            --tests "com.pomodoro.app.PomodoroConfigTest" \
            --tests "com.pomodoro.app.TimerUiStateTest" \
            --tests "com.pomodoro.app.PomodoroPhaseTest" \
            --tests "com.pomodoro.app.PhaseTransitionTest" \
            --stacktrace

      - name: 上传测试报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-report
          path: app/build/reports/tests/
          if-no-files-found: ignore

  build:
    name: Debug 构建
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 赋予 gradlew 执行权限
        run: chmod +x gradlew

      - name: 构建 Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: 上传 Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
