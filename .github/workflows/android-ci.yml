name: Android CI

on:
  push:
    branches: [ "main", "develop" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: 单元测试
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 赋予 gradlew 执行权限
        run: chmod +x gradlew

      - name: 运行单元测试
        run: |
          ./gradlew :app:testDebugUnitTest \
            --tests "com.pomodoro.app.PomodoroConfigTest" \
            --tests "com.pomodoro.app.TimerUiStateTest" \
            --tests "com.pomodoro.app.PomodoroPhaseTest" \
            --tests "com.pomodoro.app.PhaseTransitionTest" \
            --stacktrace

      - name: 上传测试报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-report
          path: app/build/reports/tests/
          if-no-files-found: ignore

  build:
    name: Debug 构建
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 赋予 gradlew 执行权限
        run: chmod +x gradlew

      - name: 构建 Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: 上传 Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

  release:
    name: 发布 Release
    runs-on: ubuntu-latest
    needs: test
    # 仅在推送 v* tag 时触发
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 赋予 gradlew 执行权限
        run: chmod +x gradlew

      - name: 构建 Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: 重命名 APK（含版本号）
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/pomodoro-${VERSION}.apk

      - name: 创建 GitHub Release 并上传 APK
        uses: softprops/action-gh-release@v2
        with:
          name: "番茄钟 ${{ github.ref_name }}"
          body: |
            ## 📦 安装说明

            1. 下载下方的 `pomodoro-${{ github.ref_name }}.apk` 文件到手机
            2. 手机设置中开启「允许安装未知来源应用」
            3. 用文件管理器找到 APK，点击安装

            > ⚠️ 这是 Debug 版本，仅供个人测试使用。
          files: app/build/outputs/apk/debug/pomodoro-${{ github.ref_name }}.apk
          draft: false
          prerelease: false
